<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var l = window.location
      var path = l.pathname.replace('/nihongo', '') || '/'
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/nihongo/?p=' +
          encodeURIComponent(path) +
          (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
          l.hash,
      )
    </script>
  </head>
</html>
